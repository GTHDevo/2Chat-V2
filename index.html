<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat Hub 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  width: 25%;
  background: #151515;
  padding: 10px;
  overflow-y: auto;
}

.channel {
  padding: 10px;
  margin: 5px 0;
  background: #222;
  border-radius: 8px;
  cursor: pointer;
}

/* RIGHT */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.top {
  display: flex;
  gap: 5px;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: #ff0055;
  color: white;
  cursor: pointer;
}

/* PANELS */
.chats {
  flex: 1;
  display: flex;
  flex-direction: column;
}

iframe {
  flex: 1;
  border: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>🔥 Kanallar</h3>
    <div id="list"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="top">
      <input id="yt" placeholder="YouTube @kanal veya video link">
      <input id="kick" placeholder="Kick kanal adı">
      <button onclick="start()">Aç</button>
    </div>

    <div class="chats">
      <iframe id="ytVideo"></iframe>
      <iframe id="ytChat"></iframe>
      <iframe id="kickFrame"></iframe>
    </div>

  </div>

</div>

<script>

/* 🔥 KANALLAR */
const channels = [
  {
    name: "MervanT",
    channelId: "UCtt2fF2vhAZA4AjekpuuxDg",
    kick: "mervant0"
  }
];

/* LIST */
const list = document.getElementById("list");

channels.forEach(c => {
  let div = document.createElement("div");
  div.className = "channel";
  div.innerText = c.name;

  div.onclick = () => openChannel(c);

  list.appendChild(div);
});


/* 💥 STABLE OPEN */
async function openChannel(c) {

  // 🎥 VIDEO
  document.getElementById("ytVideo").src =
    `https://www.youtube.com/embed/live_stream?channel=${c.channelId}`;

  // 🔍 LIVE ID
  let liveID = await getLiveVideoId(c.channelId);

  if (liveID) {
    // 💬 CHAT (SEPARATE IFRAME)
    document.getElementById("ytChat").src =
      `https://www.youtube.com/live_chat?v=${liveID}&embed_domain=${window.location.hostname}`;
  } else {
    document.getElementById("ytChat").src = "";
  }

  // 🎮 KICK
  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${c.kick}/chat`;
}


/* 🔍 LIVE DETECTOR */
async function getLiveVideoId(channelId) {
  try {
    let res = await fetch(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
    let text = await res.text();

    let match = text.match(/videoId>([a-zA-Z0-9_-]{11})</);

    return match ? match[1] : null;

  } catch (e) {
    return null;
  }
}


/* MANUEL */
async function start() {

  let yt = document.getElementById("yt").value.trim();
  let kick = document.getElementById("kick").value.trim();

  if (!yt || !kick) {
    alert("⚠️ İkisini de gir!");
    return;
  }

  let ytID = extractID(yt);

  if (!ytID) {
    alert("❌ YouTube ID bulunamadı!");
    return;
  }

  // 🎥 VIDEO
  document.getElementById("ytVideo").src =
    `https://www.youtube.com/embed/live_stream?channel=${ytID}`;

  // 💬 CHAT FIX
  let liveID = await getLiveVideoId(ytID);

  if (liveID) {
    document.getElementById("ytChat").src =
      `https://www.youtube.com/live_chat?v=${liveID}&embed_domain=${window.location.hostname}`;
  } else {
    document.getElementById("ytChat").src = "";
  }

  // 🎮 KICK
  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${kick}/chat`;
}


/* YT ID */
function extractID(url) {
  let m = url.match(/v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  return null;
}

</script>

</body>
</html>
