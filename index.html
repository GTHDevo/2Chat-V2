<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 2 Chat Hub</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}

.container {
  display: flex;
  height: 100vh;
  padding: 10px;
  gap: 10px;
}

.left {
  width: 260px;
  padding: 10px;
}

.channel {
  padding: 12px;
  margin: 6px 0;
  cursor: pointer;
  transition: 0.2s;
}

.channel:hover {
  background: rgba(255,36,0,0.3);
  box-shadow: 0 0 10px #ff2400;
}

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.top {
  display: flex;
  gap: 8px;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ff2400;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 10px #ff2400;
}

.live {
  padding: 5px 10px;
  background: red;
  border-radius: 20px;
  font-size: 12px;
  display: inline-block;
  box-shadow: 0 0 10px red;
}

.video {
  height: 40%;
  overflow: hidden;
}

.video iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 16px;
}

.chats {
  flex: 1;
  display: flex;
  gap: 10px;
}

.chat {
  flex: 1;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left {
    width: 100%;
    display: flex;
    overflow-x: auto;
  }

  .chats {
    overflow: hidden;
    position: relative;
  }

  .chat {
    min-width: 100%;
    transition: transform 0.3s;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left glass">
    <h3>🔥 Kanallar</h3>
    <div id="list"></div>
  </div>

  <div class="right">

    <div class="top glass">
      <input id="yt" placeholder="YouTube link">
      <input id="kick" placeholder="Kick kanal">
      <button onclick="start()">Aç</button>
      <span id="liveBadge" class="live">OFFLINE</span>
    </div>

    <div class="video glass">
      <iframe id="videoFrame"></iframe>
    </div>

    <div class="chats" id="chatContainer">
      <div class="chat glass"><iframe id="ytFrame"></iframe></div>
      <div class="chat glass"><iframe id="kickFrame"></iframe></div>
    </div>

  </div>

</div>

<script>

let currentYT = "";
let currentKick = "";
let currentChannelId = "";
let currentIndex = 0;

/* CHANNELS (FIXED) */
const channels = [
  {
    name: "MervanT",
    channelId: "UCtt2fF2vhAZA4AjekpuuxDg",
    kick: "mervant0"
  },
  {
    name: "iShowSpeed",
    channelId: "UCWsDFcIhY2DBi3GB5uykGXA",
    kick: ""
  }
];

/* LIST */
const list = document.getElementById("list");

channels.forEach(c => {
  let div = document.createElement("div");
  div.className = "channel glass";
  div.innerText = c.name;
  div.onclick = () => openChannel(c);
  list.appendChild(div);
});

/* 💥 FIXED OPEN CHANNEL (NEW LIVE SYSTEM) */
async function openChannel(c) {

  currentChannelId = c.channelId;
  currentKick = c.kick;

  // 🎥 VIDEO ALWAYS LIVE STREAM
  document.getElementById("videoFrame").src =
    `https://www.youtube.com/embed/live_stream?channel=${c.channelId}`;

  // 🔍 GET LIVE VIDEO ID (FOR CHAT)
  let liveID = await getLiveVideoId(c.channelId);

  if (liveID) {
    currentYT = liveID;

    document.getElementById("ytFrame").src =
      `https://www.youtube.com/live_chat?v=${liveID}&embed_domain=${location.hostname}`;

    setLive(true);
  } else {
    document.getElementById("ytFrame").src = "";
    setLive(false);
  }

  // 🎮 KICK
  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${c.kick}/chat`;
}

/* 🔍 LIVE DETECTOR (FIX CORE) */
async function getLiveVideoId(channelId) {
  try {
    let res = await fetch(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
    let text = await res.text();

    let match = text.match(/videoId>([a-zA-Z0-9_-]{11})</);

    return match ? match[1] : null;
  } catch (e) {
    return null;
  }
}

/* INPUT FIXED */
async function start() {

  let yt = document.getElementById("yt").value.trim();
  let kick = document.getElementById("kick").value.trim();

  let ytID = extractID(yt);
  if (!ytID) return alert("YT ID yok");

  currentChannelId = ytID;
  currentKick = kick;

  document.getElementById("videoFrame").src =
    `https://www.youtube.com/embed/live_stream?channel=${ytID}`;

  let liveID = await getLiveVideoId(ytID);

  if (liveID) {
    document.getElementById("ytFrame").src =
      `https://www.youtube.com/live_chat?v=${liveID}&embed_domain=${location.hostname}`;

    setLive(true);
  } else {
    document.getElementById("ytFrame").src = "";
    setLive(false);
  }

  document.getElementById("kickFrame").src =
    `https://kick.com/popout/${kick}/chat`;
}

/* LIVE BADGE */
function setLive(state) {
  const badge = document.getElementById("liveBadge");

  if (state) {
    badge.innerText = "🔴 LIVE";
    badge.style.background = "red";
  } else {
    badge.innerText = "OFFLINE";
    badge.style.background = "gray";
  }
}

/* ID EXTRACT */
function extractID(url) {
  let m = url.match(/v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];

  return null;
}

/* SWIPE (UNCHANGED) */
let startX = 0;

document.getElementById("chatContainer").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("chatContainer").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) currentIndex++;
  if (endX - startX > 50) currentIndex--;

  currentIndex = Math.max(0, Math.min(1, currentIndex));

  document.querySelectorAll(".chat").forEach((el, i) => {
    el.style.transform = `translateX(-${currentIndex * 100}%)`;
  });
});

</script>

</body>
</html>
